services:

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataops-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataops-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dataops-network

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dataops123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p dataops123 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dataops-network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -dir=/data
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dataops-network

  init-neo4j:
    image: neo4j:5-community
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./infra/scripts:/scripts:ro
    entrypoint: ["/bin/bash", "/scripts/seed-neo4j.sh"]
    restart: "no"
    networks:
      - dataops-network

  init-seaweedfs:
    image: amazon/aws-cli:latest
    depends_on:
      seaweedfs:
        condition: service_healthy
    volumes:
      - ./infra/scripts:/scripts:ro
      - ./infra/docs:/infra/docs:ro
    entrypoint: ["/bin/bash", "/scripts/init-seaweedfs.sh"]
    environment:
      AWS_ACCESS_KEY_ID: any
      AWS_SECRET_ACCESS_KEY: any
      AWS_DEFAULT_REGION: us-east-1
    restart: "no"
    networks:
      - dataops-network

  data-generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - GENERATOR_INTERVAL_SECONDS=30
      - POSTGRES_HOST=postgres
      - MONGO_HOST=mongo
      - SEAWEEDFS_HOST=seaweedfs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - dataops-network
    restart: unless-stopped

networks:
  dataops-network:
    driver: bridge

volumes:
  pg_data:
  mongo_data:
  qdrant_data:
  neo4j_data:
  seaweedfs_data:
